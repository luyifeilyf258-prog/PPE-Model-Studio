project:
  case_name: case_demo
  output_dir: ./output
  random_seed: 24
build:
  mode: geometry_only
  save_json: true
  save_preview_png: true
  save_java: true
  run_comsol: false
  save_mph: false
geometry:
  unit: m
battery:
  width_h: 4.0e-05
  thickness_d: 1.0e-05
  neg_length: 6.1e-05
  sep_length: 2.0e-05
  pos_length: 4.85e-05
negative_electrode:
  active_fraction: 0.5
  binder_fraction: 0.03
  particle:
    mean_diameter: 8.8e-06
    diameter_dispersion: 0.3
    lognormal_std: 0.2
    min_diameter_factor: 0.7
    max_diameter_factor: 1.3
  binder:
    width_dispersion: 0.1
    lognormal_std: 0.2
    collector_connection_width_factor: 1.0
  packing:
    max_attempts_per_particle: 5000
    target_fill_tolerance: 0.02
    sort_particles_descending: true
    allow_tangent_contact: false
  network:
    method: delaunay
    max_edge_length: null
    enable_collector_connections: true
positive_electrode:
  active_fraction: 0.5
  binder_fraction: 0.03
  particle:
    mean_diameter: 5.8e-06
    diameter_dispersion: 0.3
    lognormal_std: 0.2
    min_diameter_factor: 0.7
    max_diameter_factor: 1.3
  binder:
    width_dispersion: 0.1
    lognormal_std: 0.2
    collector_connection_width_factor: 1.0
  packing:
    max_attempts_per_particle: 5000
    target_fill_tolerance: 0.02
    sort_particles_descending: true
    allow_tangent_contact: false
  network:
    method: delaunay
    max_edge_length: null
    enable_collector_connections: true
electrochemistry:
  electrolyte:
    cl_init: 1200.0
  perturbation:
    e_pert: 0.01
  cv:
    scan_rate_mV_per_s: 100.0
    v_max: 4.5
    v_min: 2.5
  cycling:
    c_rate: 1.0
  positive:
    soc0: 0.15
    k0: 9.32e-10
    r_film: 0.01
    c_dl: 1.0
  negative:
    soc0: 0.98
    k0: 3.67e-10
    r_film: 1.0e-05
    c_dl: 1.0
  binder:
    sigma_s: 100.0
    sigma_l: 100.0
comsol:
  model_name: Model
  component_name: comp1
  geometry_name: geom1
  mesh_name: mesh1
  java:
    package_name: com.example.comsol
    class_name: PPE_model
    java_output_dir: ./output/java
  runner:
    comsolcompile_path: E:/Comsol6.4/COMSOL64/Multiphysics/bin/win64/comsolcompile.exe
    comsolbatch_path: E:/Comsol6.4/COMSOL64/Multiphysics/bin/win64/comsolbatch.exe
selections:
  names:
    neg_region: neg_region
    sep_region: sep_region
    pos_region: pos_region
    neg_particles: neg_particles
    pos_particles: pos_particles
    neg_binder: neg_binder
    pos_binder: pos_binder
    electrolyte: electrolyte
    neg_particle_liq_interface: neg_particle_liq_interface
    pos_particle_liq_interface: pos_particle_liq_interface
    neg_particle_binder_interface: neg_particle_binder_interface
    pos_particle_binder_interface: pos_particle_binder_interface
    neg_binder_liq_interface: neg_binder_liq_interface
    pos_binder_liq_interface: pos_binder_liq_interface
    neg_collector_boundary: neg_collector_boundary
    pos_collector_boundary: pos_collector_boundary
debug:
  save_intermediate_geometry_json: true
  save_particle_table_csv: true
  save_binder_table_csv: true
  verbose_logging: true
advanced_settings:
  mesh_size: normal
  mesh_hauto: 5
  transient_max_iter: 100
  stationary_max_iter: 100
  cutoff_voltage: 3.3
  time_step: 1.0
